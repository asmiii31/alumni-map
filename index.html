    let currentMarkers = [];

    function renderMarkers(data) {
        // Clear old markers
        currentMarkers.forEach(m => m.remove());
        currentMarkers = [];

        data.forEach(item => {
            const el = document.createElement('div');
            el.className = 'marker';

            const popup = new mapboxgl.Popup({ offset: 25 })
                .setHTML(`
                    <h3>${item.Name}</h3>
                    <p><strong>State:</strong> ${item.State}</p>
                    <p><strong>Programme:</strong> ${item.Programme[0]}</p>
                    <p><strong>Year:</strong> ${item.Year}</p>
                `);

            const marker = new mapboxgl.Marker(el)
                .setLngLat([item.Longitude, item.Latitude])
                .setPopup(popup)
                .addTo(map);
            
            currentMarkers.push(marker);
        });

        document.getElementById('counter').innerText = `Showing ${data.length} organizations`;
    }

    function filterData() {
        const year = document.getElementById('yearFilter').value;
        const prog = document.getElementById('progFilter').value;

        const filtered = alumni.filter(item => {
            const matchesYear = year === 'all' || item.Year.toString() === year;
            const matchesProg = prog === 'all' || item.Programme[0].includes(prog);
            return matchesYear && matchesProg;
        });

        renderMarkers(filtered);
    }

    map.on('load', () => {
        renderMarkers(alumni);
    });
</script>

</body>
