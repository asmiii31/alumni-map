<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Pravah Alumni Impact Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; font-family: 'Helvetica Neue', Arial, sans-serif; height: 100vh; overflow: hidden; background-color: #f4f7f6; }
        
        #sidebar { 
            width: 350px; 
            background: #2c3e50; 
            color: white; 
            padding: 25px; 
            overflow-y: auto; 
            box-shadow: 2px 0 5px rgba(0,0,0,0.2); 
            z-index: 1000; 
            display: flex;
            flex-direction: column;
        }

        #map { flex-grow: 1; height: 100vh; }

        h2 { margin-top: 0; color: #ecf0f1; font-weight: 300; border-bottom: 1px solid #34495e; padding-bottom: 10px; }
        
        .filter-group { margin-bottom: 25px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 0.85em; 
            color: #bdc3c7; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 4px; 
            border: none; 
            background: #34495e; 
            color: white; 
            font-size: 1em; 
            cursor: pointer;
            outline: none;
        }

        select:hover { background: #3d566e; }

        .count-tracker { 
            margin-top: auto; 
            padding-top: 20px;
            font-size: 0.9em; 
            color: #1abc9c; 
            font-weight: bold;
        }

        /* Leaflet Popup Styling */
        .leaflet-popup-content-wrapper {
            border-radius: 8px;
            padding: 5px;
        }
        .popup-title { color: #e67e22; margin: 0; font-size: 1.1em; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Pravah Impact Map</h2>
    <p style="font-size: 0.85em; line-height: 1.5; color: #bdc3c7; margin-bottom: 30px;">
        Visualizing the reach of our partners and alumni across India.
    </p>

    <div class="filter-group">
        <label>Filter by Year</label>
        <select id="yearFilter" onchange="filterData()">
            <option value="all">All Years</option>
            <option value="2024">2024</option>
            <option value="2025">2025</option>
            <option value="2026">2026</option>
        </select>
    </div>

    <div class="filter-group">
        <label>Filter by Programme</label>
        <select id="progFilter" onchange="filterData()">
            <option value="all">All Programmes</option>
            <option value="Saanstha">Saanstha</option>
            <option value="Big Ticket">Big Ticket</option>
            <option value="Ocean in a Drop">Ocean in a Drop</option>
        </select>
    </div>

    <div id="counter" class="count-tracker">Updating...</div>
</div>

<div id="map"></div>

<script>
    // 1. Initialize the map centered on India
    const map = L.map('map').setView([22.5937, 78.9629], 5);

    // 2. Add OpenStreetMap Tiles (Free)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors',
        maxZoom: 18
    }).addTo(map);

    // 3. FULL DATASET
    const alumni = [
        {"Name": "Muskan Foundation", "Programme": ["Saanstha / संस्था"], "State": "Madhya Pradesh", "Latitude": 23.2599, "Longitude": 77.4126, "Year": 2024},
        {"Name": "Mahila Jan Adhikar Samiti", "Programme": ["Saanstha / संस्था"], "State": "Rajasthan", "Latitude": 26.4499, "Longitude": 74.6399, "Year": 2024},
        {"Name": "Vimarsh Collective", "Programme": ["Saanstha / संस्था"], "State": "Madhya Pradesh", "Latitude": 22.7196, "Longitude": 75.8577, "Year": 2024},
        {"Name": "Gramin Shiksha Kendra", "Programme": ["Saanstha / संस्था"], "State": "Rajasthan", "Latitude": 26.0101, "Longitude": 76.3551, "Year": 2024},
        {"Name": "The Blue Ribbon Movement", "Programme": ["Saanstha / संस्था"], "State": "Maharashtra", "Latitude": 19.0760, "Longitude": 72.8777, "Year": 2024},
        {"Name": "Farm 2 Food Foundation", "Programme": ["Saanstha / संस्था"], "State": "Assam", "Latitude": 26.7509, "Longitude": 94.2037, "Year": 2024},
        {"Name": "Tarique Foundation", "Programme": ["Saanstha / संस्था"], "State": "Uttar Pradesh", "Latitude": 26.8467, "Longitude": 80.9462, "Year": 2024},
        {"Name": "FAT", "Programme": ["Saanstha / संस्था"], "State": "Delhi", "Latitude": 28.6139, "Longitude": 77.2090, "Year": 2024},
        {"Name": "Apni Shala", "Programme": ["Saanstha / संस्था"], "State": "Maharashtra", "Latitude": 19.0178, "Longitude": 72.8478, "Year": 2024},
        {"Name": "Vatayan", "Programme": ["Saanstha / संस्था"], "State": "Uttar Pradesh", "Latitude": 25.3176, "Longitude": 82.9739, "Year": 2024},
        {"Name": "ComMutiny", "Programme": ["Saanstha / संस्था"], "State": "Delhi", "Latitude": 28.5355, "Longitude": 77.1555, "Year": 2024},
        {"Name": "Pravah", "Programme": ["Saanstha / संस्था"], "State": "Delhi", "Latitude": 28.5672, "Longitude": 77.2100, "Year": 2024},
        {"Name": "Inirva", "Programme": ["Big Ticket / बिग टिकट"], "State": "Maharashtra", "Latitude": 18.5204, "Longitude": 73.8567, "Year": 2024},
        {"Name": "The Alchemist Collective", "Programme": ["Big Ticket / बिग टिकट"], "State": "Maharashtra", "Latitude": 19.2183, "Longitude": 72.9781, "Year": 2024},
        {"Name": "Canopy", "Programme": ["Big Ticket / बिग टिकट"], "State": "Delhi", "Latitude": 28.7041, "Longitude": 77.1025, "Year": 2024},
        {"Name": "ALC (India)", "Programme": ["Big Ticket / बिग टिकट"], "State": "Telangana", "Latitude": 17.3850, "Longitude": 78.4867, "Year": 2024},
        {"Name": "Kashish Foundation", "Programme": ["Big Ticket / बिग टिकट"], "State": "Bihar", "Latitude": 25.5941, "Longitude": 85.1376, "Year": 2024},
        {"Name": "Astitva Foundation", "Programme": ["Big Ticket / बिग टिकट"], "State": "Gujarat", "Latitude": 23.0225, "Longitude": 72.5714, "Year": 2024},
        {"Name": "Neev", "Programme": ["Big Ticket / बिग टिकट"], "State": "Uttarakhand", "Latitude": 30.3165, "Longitude": 78.0322, "Year": 2024},
        {"Name": "Prantakatha", "Programme": ["Ocean in a Drop / ओशन इन अ ड्रॉप"], "State": "West Bengal", "Latitude": 22.5726, "Longitude": 88.3639, "Year": 2024},
        {"Name": "Reap Benefit", "Programme": ["Ocean in a Drop / ओशन इन अ ड्रॉप"], "State": "Karnataka", "Latitude": 12.9716, "Longitude": 77.5946, "Year": 2024},
        {"Name": "People for Change", "Programme": ["Ocean in a Drop / ओशन इन अ ड्रॉप"], "State": "Jharkhand", "Latitude": 22.8046, "Longitude": 86.2029, "Year": 2024},
        {"Name": "Kizazi", "Programme": ["Ocean in a Drop / ओशन इन अ ड्रॉप"], "State": "International/Delhi", "Latitude": 28.5355, "Longitude": 77.3910, "Year": 2024},
        {"Name": "Northeast Educational Trust", "Programme": ["Ocean in a Drop / ओशन इन अ ड्रॉप"], "State": "Assam", "Latitude": 26.1445, "Longitude": 91.7362, "Year": 2024},
        {"Name": "Wayve Foundation", "Programme": ["Ocean in a Drop / ओशन इन अ ड्रॉप"], "State": "Maharashtra", "Latitude": 18.5204, "Longitude": 73.8567, "Year": 2024}
    ];

    let markerLayer = L.layerGroup().addTo(map);

    function renderMarkers(data) {
        markerLayer.clearLayers();

        data.forEach(item => {
            const marker = L.circleMarker([item.Latitude, item.Longitude], {
                radius: 8,
                fillColor: "#e67e22",
                color: "#fff",
                weight: 2,
                opacity: 1,
                fillOpacity: 0.9
            });

            marker.bindPopup(`
                <div style="font-family: sans-serif;">
                    <h3 class="popup-title">${item.Name}</h3>
                    <hr style="border:0; border-top:1px solid #eee; margin: 8px 0;">
                    <b>State:</b> ${item.State}<br>
                    <b>Programme:</b> ${item.Programme[0]}<br>
                    <b>Year:</b> ${item.Year}
                </div>
            `);

            markerLayer.addLayer(marker);
        });

        document.getElementById('counter').innerText = `Showing ${data.length} Organizations`;
    }

    function filterData() {
        const selectedYear = document.getElementById('yearFilter').value;
        const selectedProg = document.getElementById('progFilter').value;

        const filtered = alumni.filter(item => {
            const matchesYear = selectedYear === 'all' || item.Year.toString() === selectedYear;
            const matchesProg = selectedProg === 'all' || item.Programme[0].includes(selectedProg);
            return matchesYear && matchesProg;
        });

        renderMarkers(filtered);
    }

    // Initial Load
    renderMarkers(alumni);
</script>

</body>
</html>
